<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SkinIQ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root {
    /* Light Theme (Premium Skincare Look) */
    --bg: #FAFAFA;
    --surface: #FFFFFF;
    --surface-alt: #F3F4F6;
    --ink: #111827;
    --ink-soft: #4B5563;
    --ink-faint: #9CA3AF;
    --border: #E5E7EB;
    --border-strong: #D1D5DB;
    --primary: #1A4D41;
    --primary-dark: #12372F;
    --primary-tint: #E8F0EE;
    --primary-glow: rgba(26, 77, 65, 0.2);
    --good: #059669;
    --good-tint: #D1FAE5;
    --warn: #D97706;
    --warn-tint: #FEF3C7;
    --bad: #DC2626;
    --bad-tint: #FEE2E2;
    --radius: 16px;
    --radius-sm: 10px;
    --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
    --shadow-hover: 0 10px 15px -3px rgba(0, 0, 0, 0.08), 0 4px 6px -2px rgba(0, 0, 0, 0.04);
  }

  body.dark-mode {
    --bg: #0F1115;
    --surface: #181B21;
    --surface-alt: #23272F;
    --ink: #F9FAFB;
    --ink-soft: #9CA3AF;
    --ink-faint: #6B7280;
    --border: #2D333B;
    --border-strong: #374151;
    --primary: #2DD4BF;
    --primary-dark: #14B8A6;
    --primary-tint: rgba(45, 212, 191, 0.15);
    --primary-glow: rgba(45, 212, 191, 0.3);
    --good: #34D399;
    --good-tint: rgba(52, 211, 153, 0.15);
    --warn: #FBBF24;
    --warn-tint: rgba(251, 191, 36, 0.15);
    --bad: #F87171;
    --bad-tint: rgba(248, 113, 113, 0.15);
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--ink);
    font-family: 'Inter', ui-sans-serif, system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    transition: background 0.3s ease, color 0.3s ease;
  }
  
  h1, h2, h3, .display {
    font-family: 'Inter', ui-sans-serif, system-ui, sans-serif;
    font-weight: 700; letter-spacing: -0.02em; margin: 0; color: var(--ink);
  }
  
  .mono { font-family: 'IBM Plex Mono', monospace; letter-spacing: -0.01em; }
  
  #app {
    max-width: 480px; margin: 0 auto; min-height: 100vh;
    background: var(--bg); position: relative; padding-bottom: 16px;
    border-left: 1px solid var(--border); border-right: 1px solid var(--border);
    transition: background 0.3s ease, border-color 0.3s ease;
    overflow-x: hidden;
  }
  
  .screen { animation: fadeIn .3s cubic-bezier(0.16, 1, 0.3, 1); }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  /* Toast Notification */
  .toast {
    position: fixed; top: -60px; left: 50%; transform: translateX(-50%);
    background: var(--primary); color: #fff; padding: 12px 24px;
    border-radius: 30px; font-weight: 600; font-size: 14px;
    transition: top 0.4s cubic-bezier(0.16, 1, 0.3, 1); z-index: 9999;
    box-shadow: 0 10px 25px var(--primary-glow); white-space: nowrap;
  }
  .toast.show { top: 30px; }

  /* Top bar */
  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 20px 24px; border-bottom: 1px solid var(--border); background: var(--surface);
    position: sticky; top: 0; z-index: 10; transition: background 0.3s, border-color 0.3s;
  }
  .brand { display: flex; align-items: center; gap: 10px; }
  .brand-mark {
    width: 32px; height: 32px; border-radius: 8px; background: var(--primary);
    display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px var(--primary-glow);
  }
  .brand-mark svg { width: 18px; height: 18px; color: #fff; }
  .brand-name { font-weight: 800; font-size: 18px; letter-spacing: -0.03em; }
  
  .iconbtn {
    background: var(--surface); border: 1px solid var(--border);
    width: 38px; height: 38px; border-radius: var(--radius-sm);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; color: var(--ink-soft); transition: all 0.2s;
  }
  .iconbtn svg { width: 18px; height: 18px; }
  .iconbtn:hover { background: var(--surface-alt); border-color: var(--border-strong); color: var(--ink); transform: translateY(-1px); }

  /* Layout helpers */
  .container { padding: 0 24px; }
  .stack { display: flex; flex-direction: column; gap: 16px; }
  .row { display: flex; align-items: center; gap: 12px; }
  
  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 22px; box-shadow: var(--shadow);
    transition: background 0.3s, border-color 0.3s, transform 0.2s, box-shadow 0.2s;
  }
  .card-hover:hover { transform: translateY(-2px); box-shadow: var(--shadow-hover); }
  
  .muted { color: var(--ink-soft); font-size: 13.5px; line-height: 1.6; }
  .label { font-size: 11.5px; font-weight: 700; color: var(--ink-faint); text-transform: uppercase; letter-spacing: .08em; }
  .divider { height: 1px; background: var(--border); margin: 16px 0; transition: background 0.3s; }

  .section-head { display: flex; flex-direction: column; gap: 4px; margin-bottom: 4px; margin-top: 8px;}
  .section-eyebrow { font-family: 'IBM Plex Mono'; font-size: 11px; font-weight: 600; color: var(--primary); letter-spacing: .08em; text-transform: uppercase; }
  .section-head h3 { font-size: 17px; }

  /* Buttons */
  .btn {
    border: none; border-radius: var(--radius-sm); padding: 14px 20px;
    font-family: 'Inter'; font-weight: 600; font-size: 15px; cursor: pointer;
    display: inline-flex; align-items: center; justify-content: center; gap: 8px; width: 100%;
    transition: all .2s ease;
  }
  .btn:active { transform: scale(0.98); }
  .btn-primary { background: var(--primary); color: #fff; box-shadow: 0 4px 12px var(--primary-glow); }
  .btn-primary:hover { background: var(--primary-dark); }
  .btn-ghost { background: var(--surface); color: var(--ink); border: 1px solid var(--border-strong); }
  .btn-ghost:hover { background: var(--surface-alt); }
  .btn-text { background: none; border: none; color: var(--primary); font-weight: 600; font-size: 14px; cursor: pointer; padding: 6px; text-decoration: underline; text-underline-offset: 3px; }
  .btn-alert { background: var(--bad); color: #fff; }

  /* Inputs */
  .field { display: flex; flex-direction: column; gap: 8px; }
  .field label { font-size: 13.5px; font-weight: 600; color: var(--ink); }
  .field input, .field select, .field textarea {
    border: 1px solid var(--border-strong); border-radius: var(--radius-sm); padding: 12px 16px;
    font-size: 15px; font-family: 'Inter'; background: var(--surface); color: var(--ink); outline: none;
    transition: border-color 0.2s, box-shadow 0.2s, background 0.3s;
  }
  .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-tint); }
  
  .status-text { font-size: 13px; font-weight: 600; text-align: center; margin-top: 5px;}
  .status-text.error { color: var(--bad); }
  .status-text.success { color: var(--good); }

  /* Auth screen */
  .auth-hero { padding: 50px 24px 30px; text-align: center; background: var(--surface); border-bottom: 1px solid var(--border); }
  .auth-hero .brand-mark { width: 56px; height: 56px; border-radius: 16px; margin: 0 auto 20px; }
  .auth-hero .brand-mark svg { width: 32px; height: 32px; }
  .auth-hero h1 { font-size: 26px; margin-bottom: 8px; }
  
  .tabbar { display: flex; background: var(--surface-alt); border-radius: var(--radius-sm); padding: 4px; gap: 4px; }
  .tab { flex: 1; text-align: center; padding: 10px; border-radius: 8px; font-weight: 600; font-size: 14px; cursor: pointer; color: var(--ink-soft); transition: all 0.2s; }
  .tab.active { background: var(--surface); color: var(--primary); box-shadow: var(--shadow); }
  
  .guest-note { background: var(--surface-alt); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 14px; font-size: 13px; color: var(--ink-soft); line-height: 1.6; text-align: center;}
  .disclaimer { font-size: 12px; color: var(--ink-faint); text-align: center; line-height: 1.6; padding: 0 10px; }

  /* Pill Choice */
  .pillrow { display: flex; flex-wrap: wrap; gap: 10px; }
  .pill {
    border: 1px solid var(--border-strong); background: var(--surface); border-radius: var(--radius-sm);
    padding: 10px 16px; font-size: 14px; cursor: pointer; color: var(--ink); font-weight: 500;
    transition: all 0.2s;
  }
  .pill.selected { background: var(--primary); border-color: var(--primary); color: #fff; box-shadow: 0 4px 10px var(--primary-glow); transform: translateY(-1px); }

  /* Progress bar */
  .progress-track { height: 6px; background: var(--border); border-radius: 99px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--primary); border-radius: 99px; transition: width .4s cubic-bezier(0.16, 1, 0.3, 1); }

  /* Capture */
  .capture-frame { aspect-ratio: 3/4; border-radius: var(--radius); background: #10171D; position: relative; overflow: hidden; border: 1px solid var(--border); box-shadow: inset 0 0 20px rgba(0,0,0,0.5); }
  .capture-frame video, .capture-frame img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .capture-oval { position: absolute; inset: 10% 22%; border: 2px dashed rgba(255,255,255,0.6); border-radius: 50%; pointer-events: none; }
  .capture-placeholder { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #8A98A0; gap: 12px; font-size: 14px; }
  .capture-placeholder svg { width: 32px; height: 32px; opacity: .8; }
  .capture-actions { display: flex; gap: 12px; margin-top: 16px; }
  .tip-item { display: flex; gap: 10px; font-size: 13.5px; color: var(--ink-soft); align-items: flex-start; }
  .tip-item svg { width: 18px; height: 18px; flex: none; margin-top: 2px; color: var(--primary); }
  .stepper { display: flex; gap: 8px; justify-content: center; margin: 10px 0; }
  .stepdot { width: 8px; height: 8px; border-radius: 50%; background: var(--border-strong); transition: all 0.3s; }
  .stepdot.done { background: var(--good); }
  .stepdot.active { background: var(--primary); transform: scale(1.3); }

  /* Analyzing */
  .analyzing-wrap { padding: 80px 30px; text-align: center; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 70vh; }
  .spinner { width: 60px; height: 60px; border-radius: 50%; border: 4px solid var(--primary-tint); border-top-color: var(--primary); margin: 0 auto 24px; animation: spin 1s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Score Popup */
  .popup-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 20px; backdrop-filter: blur(4px); }
  .popup-card { background: var(--surface); border-radius: var(--radius); padding: 30px 24px; width: 100%; max-width: 360px; text-align: center; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); animation: popIn 0.4s cubic-bezier(0.16, 1, 0.3, 1); border: 1px solid var(--border); }
  @keyframes popIn { 0% { transform: scale(0.9); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
  .popup-number { font-size: 48px; font-weight: 800; color: var(--primary); font-family: 'IBM Plex Mono'; line-height: 1; margin: 10px 0; }

  /* Metrics */
  .metric-row { display: flex; flex-direction: column; gap: 6px; }
  .metric-head { display: flex; justify-content: space-between; font-size: 13.5px; }
  .metric-head b { font-weight: 700; font-family: 'IBM Plex Mono'; font-size: 13px; }
  .metric-track { height: 8px; background: var(--border); border-radius: 99px; overflow: hidden; }
  .metric-fill { height: 100%; border-radius: 99px; transition: width 1s ease-out; }

  .badge { display: inline-flex; align-items: center; gap: 6px; font-size: 11px; font-weight: 700; padding: 6px 12px; border-radius: 99px; text-transform: uppercase; letter-spacing: .05em; font-family: 'IBM Plex Mono'; }
  .badge-good { background: var(--good-tint); color: var(--good); }
  .badge-mid { background: var(--warn-tint); color: var(--warn); }
  .badge-bad { background: var(--bad-tint); color: var(--bad); }

  .angle-tabs { display: flex; gap: 4px; background: var(--surface-alt); padding: 4px; border-radius: var(--radius-sm); }
  .angle-tab { flex: 1; text-align: center; padding: 10px; border-radius: 8px; font-size: 13.5px; font-weight: 600; color: var(--ink-soft); cursor: pointer; transition: all 0.2s; }
  .angle-tab.active { background: var(--surface); color: var(--primary); box-shadow: var(--shadow); }

  .rec-card { border: 1px solid var(--border); border-left: 4px solid var(--primary); border-radius: var(--radius-sm); padding: 18px; background: var(--surface); transition: background 0.3s; }
  .rec-cat { font-size: 11px; text-transform: uppercase; letter-spacing: .08em; color: var(--primary); font-weight: 700; font-family: 'IBM Plex Mono'; }
  .rec-ing { font-weight: 700; font-size: 16px; margin: 6px 0 8px; letter-spacing: -0.01em; }
  .warning-box { background: var(--bad-tint); border: 1px solid rgba(220, 38, 38, 0.3); border-radius: var(--radius-sm); padding: 14px; font-size: 13px; color: var(--bad); line-height: 1.6; display: flex; gap: 10px; }

  .history-item { display: flex; gap: 14px; align-items: center; padding: 14px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--surface); cursor: pointer; transition: all 0.2s; }
  .history-item:hover { border-color: var(--border-strong); transform: translateX(2px); box-shadow: var(--shadow); }
  .history-thumb { width: 56px; height: 56px; border-radius: 10px; object-fit: cover; background: var(--surface-alt); flex: none; }
  .history-thumb.placeholder { display: flex; align-items: center; justify-content: center; color: var(--primary); }
  .history-thumb.placeholder svg { width: 22px; height: 22px; }

  .delete-hist-btn { padding: 8px; color: var(--bad); background: transparent; border: none; border-radius: 8px; cursor: pointer; transition: background 0.2s; }
  .delete-hist-btn:hover { background: var(--bad-tint); }

  .bottomnav {
    position: sticky; bottom: 0; background: var(--surface); border-top: 1px solid var(--border);
    display: flex; padding: 10px 20px calc(10px + env(safe-area-inset-bottom)); gap: 8px; margin-top: 24px; z-index: 10;
    transition: background 0.3s, border-color 0.3s;
  }
  .navbtn { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 10px 4px; border-radius: var(--radius-sm); cursor: pointer; color: var(--ink-faint); font-size: 11px; font-weight: 700; transition: color 0.2s; }
  .navbtn.active { color: var(--primary); }
  .navbtn svg { width: 22px; height: 22px; margin-bottom: 2px; }

  .empty-state { text-align: center; padding: 60px 24px; color: var(--ink-soft); }
  .fade-banner { background: var(--surface-alt); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 14px; font-size: 13px; color: var(--ink-soft); display: flex; justify-content: space-between; align-items: center; gap: 12px; }
  .skip-link { text-align: center; padding: 8px 0; }

  ::selection { background: var(--primary-tint); }
</style>
</head>
<body>
<div id="app"></div>

<script>
/* =========================================================
   SkinIQ — Core Application Logic
   ========================================================= */

const state = {
  screen: 'auth',
  authMode: 'login',
  user: null,         // {name, email} when logged in
  isGuest: false,
  justLoggedIn: false,
  history: [],        // persisted only for logged-in users
  capture: { front:null, left:null, right:null },
  captureStep: 'front',
  skippedScan: false,
  report: null,
  answers: {},
  qStep: 0,
  activeAngleTab: 'front',
  viewingHistoryId: null,
  darkMode: false
};

const QUESTIONS = [
  { key:'skinType', title:"How would you describe your skin?", type:'pills', options:['Dry','Oily','Combination','Sensitive','Normal'] },
  { key:'duration', title:"How long has this skin concern been going on?", type:'pills', options:['< 1 month','1–3 months','3–12 months','1+ years'] },
  { key:'worsened', title:"Has your skin gotten noticeably worse recently?", type:'pills', options:['Yes','No'] },
  { key:'worsenedWhen', title:"When did it get worse, and what changed around that time?", type:'text', placeholder:'e.g. 3 weeks ago, after switching moisturizers…', showIf:(a)=>a.worsened==='Yes' },
  { key:'sunExposure', title:"How much direct sun exposure do you get daily?", type:'pills', options:['< 30 min','30–60 min','1–3 hrs','3+ hrs'] },
  { key:'spf', title:"How often do you wear sunscreen?", type:'pills', options:['Daily','Sometimes','Rarely','Never'] },
  { key:'diet', title:"How often do you eat sugary, fried, or dairy-heavy food?", type:'pills', options:['Rarely','A few times a week','Daily'] },
  { key:'deficiency', title:"Any known vitamin/mineral deficiencies? (optional)", type:'text', placeholder:'e.g. Vitamin D, Iron — or leave blank' },
  { key:'health', title:"Any hormonal or health conditions relevant to skin? (optional)", type:'text', placeholder:'e.g. PCOS, thyroid — prefer not to say is fine', optional:true },
  { key:'sleep', title:"How many hours do you usually sleep?", type:'pills', options:['< 5 hrs','5–7 hrs','7–9 hrs','9+ hrs'] },
  { key:'age', title:"What's your age?", type:'number', placeholder:'e.g. 27' },
  { key:'weight', title:"What's your weight? (kg) — used to estimate water intake", type:'number', placeholder:'e.g. 65' },
  { key:'waterGlasses', title:"How many glasses of water (≈250ml) do you drink a day?", type:'number', placeholder:'e.g. 6' },
];

function visibleQuestions(){ return QUESTIONS.filter(q => !q.showIf || q.showIf(state.answers)); }

/* ---------------- storage helpers ---------------- */
function safeSet(key, val) {
  try { localStorage.setItem(key, val); } catch(e) { console.warn("Storage error", e); }
}
function safeGet(key) {
  try { return localStorage.getItem(key); } catch(e) { return null; }
}

async function loadUsers() {
  const data = safeGet('users');
  return data ? JSON.parse(data) : [];
}
async function saveUsers(usersArr) {
  safeSet('users', JSON.stringify(usersArr));
}

async function loadSession() {
  const data = safeGet('session');
  return data ? JSON.parse(data) : null;
}
async function saveSession() {
  if (state.isGuest) return;
  safeSet('session', JSON.stringify(state.user));
}
async function clearSession() {
  safeSet('session', '');
}

async function loadHistory() {
  if (!state.user || state.isGuest) return [];
  const data = safeGet(`history_${state.user.email}`);
  return data ? JSON.parse(data) : [];
}
async function saveHistory() {
  if (state.isGuest || !state.user) return;
  safeSet(`history_${state.user.email}`, JSON.stringify(state.history));
}

/* ---------------- ui helpers ---------------- */
function showToast(msg) {
  const existing = document.querySelector('.toast');
  if(existing) existing.remove();
  const t = el(`<div class="toast">${msg}</div>`);
  document.body.appendChild(t);
  setTimeout(() => t.classList.add('show'), 10);
  setTimeout(() => { 
    t.classList.remove('show'); 
    setTimeout(() => t.remove(), 400); 
  }, 3000);
}

function toggleDarkMode() {
  state.darkMode = !state.darkMode;
  if(state.darkMode) document.body.classList.add('dark-mode');
  else document.body.classList.remove('dark-mode');
  safeSet('theme', state.darkMode ? 'dark' : 'light');
  render();
}

/* ---------------- mock AI engine ---------------- */
function rand(min,max){ return Math.round(min + Math.random()*(max-min)); }

function analyzeSkin(angle, answers){
  // More intelligent mock based slightly on answers if they exist before scan
  let baseSebum = answers.skinType === 'Oily' ? 70 : answers.skinType === 'Dry' ? 20 : 45;
  let baseHydration = answers.skinType === 'Dry' ? 30 : 60;
  
  const sebum = Math.min(95, Math.max(10, baseSebum + rand(-15, 20)));
  const acneCount = rand(0,12);
  const inflammatoryAcne = rand(0, Math.round(acneCount*0.6));
  const pimples = rand(0, Math.round(acneCount*0.4));
  const comedones = rand(0, 15);
  const pigmentation = rand(15,70);
  const texture = Math.max(20, 80 - (acneCount*2));
  const hydration = Math.min(95, Math.max(15, baseHydration + rand(-15, 15)));
  
  const damage = Math.min(100, Math.round((sebum*0.15) + (acneCount*4) + (pigmentation*0.25) + (100-hydration)*0.2));
  return { angle, sebum, acneCount, inflammatoryAcne, pimples, comedones, pigmentation, texture, hydration, damage };
}

function combineReports(f,l,r){
  const avg = (k)=> Math.round((f[k]+l[k]+r[k])/3);
  const sum = (k)=> f[k]+l[k]+r[k];
  const overallDamage = avg('damage');
  const healthScore = Math.max(2, Math.min(98, Math.round(100 - overallDamage*0.85 - avg('sebum')*0.1)));
  return {
    healthScore, sebum: avg('sebum'), acneCount: sum('acneCount'), inflammatoryAcne: sum('inflammatoryAcne'),
    pimples: sum('pimples'), comedones: sum('comedones'), pigmentation: avg('pigmentation'),
    texture: avg('texture'), hydration: avg('hydration'), damage: overallDamage,
    byAngle: { front:f, left:l, right:r }
  };
}

function estimateSkinFromAnswers(answers){
  // pure estimation without scan
  let sebum = answers.skinType==='Oily'?75:answers.skinType==='Combination'?60:answers.skinType==='Dry'?25:45;
  let hydration = answers.skinType==='Dry'?30:answers.skinType==='Sensitive'?40:65;
  let pigmentation = 30;
  if(answers.sunExposure==='3+ hrs' || answers.sunExposure==='1–3 hrs'){
    if(answers.spf==='Rarely'||answers.spf==='Never') pigmentation += 30;
  }
  
  // No fake exact counts when skipped. 
  let acneSeverity = 0; // scale 0-10
  if(answers.duration==='1+ years') acneSeverity += 4;
  else if(answers.duration==='3–12 months') acneSeverity += 2;
  
  if(answers.worsened==='Yes') acneSeverity += 3;
  if(answers.diet==='Daily') { sebum += 10; acneSeverity += 1; }
  
  const texture = Math.max(20, 85 - (acneSeverity*5));
  sebum = Math.min(95, sebum); hydration = Math.max(10, Math.min(95, hydration)); pigmentation = Math.min(95, pigmentation);
  
  const damage = Math.min(100, Math.round((sebum*0.15)+(acneSeverity*5)+(pigmentation*0.25)+(100-hydration)*0.2));
  const healthScore = Math.max(2, Math.min(96, Math.round(100 - damage*0.85 - sebum*0.1)));
  
  const angle = { angle:'estimated', sebum, acneCount:'N/A', inflammatoryAcne:'N/A', pimples:'N/A', comedones:'N/A', pigmentation, texture, hydration, damage };
  
  return {
    healthScore, sebum, acneCount:'N/A', inflammatoryAcne:'N/A', pimples:'N/A', comedones:'N/A', pigmentation, texture, hydration, damage,
    byAngle: { front:angle, left:angle, right:angle }
  };
}

function severity(score, invert){
  if(score === 'N/A') return 'good';
  const v = invert ? 100-score : score;
  if(v>=70) return 'good';
  if(v>=40) return 'mid';
  return 'bad';
}
function sevColor(s){ return s==='good' ? 'var(--good)' : s==='mid' ? 'var(--warn)' : 'var(--bad)'; }
function sevLabel(s){ return s==='good' ? 'Healthy' : s==='mid' ? 'Watch' : 'Needs care'; }

function buildSummary(report, answers){
  const lines = [];
  lines.push(`Your overall Skin Health Score is ${report.healthScore}/100.`);
  
  lines.push(report.sebum>=60
    ? `Oil production is estimated high (${report.sebum}/100), increasing the chance of clogged pores.`
    : report.sebum<=35
      ? `Oil production is low (${report.sebum}/100) — your skin barrier requires moisture support.`
      : `Oil production is moderate (${report.sebum}/100) and fairly balanced.`);
      
  if(!state.skippedScan && report.acneCount !== 'N/A') {
    if(report.acneCount>10) lines.push(`Active acne is significant (${report.acneCount} spots detected), suggesting an active breakout cycle.`);
    else if(report.acneCount>3) lines.push(`Mild-to-moderate acne activity was detected (${report.acneCount} spots).`);
    else lines.push(`Acne activity is low — only ${report.acneCount} spots detected.`);
  } else if (state.skippedScan) {
    lines.push(`Based on your answers, we estimate your breakout severity is aligned with the duration you reported, though exact spot counts require a photo scan.`);
  }

  if(report.pigmentation>55) lines.push(`Pigmentation and uneven tone are elevated (${report.pigmentation}/100), pointing to possible sun exposure or post-acne marks.`);
  if(report.hydration<45) lines.push(`Hydration is low (${report.hydration}/100) — a compromised moisture barrier can trigger sensitivity and excess oil compensation.`);
  return lines;
}

function buildFactors(report, answers){
  const f = [];
  if(answers.sunExposure && (answers.sunExposure.includes('3+') || answers.sunExposure.includes('1–3')) && (answers.spf==='Rarely'||answers.spf==='Never')){
    f.push('High daily sun exposure combined with inconsistent sunscreen use is likely contributing to the pigmentation score.');
  }
  if(answers.diet==='Daily' && report.sebum>=55){
    f.push('Frequent sugary/fried/dairy-heavy food intake can drive oil production and inflammation.');
  }
  if(answers.waterGlasses!=null && answers.weight){
    const recommendedL = (Number(answers.weight)*0.033).toFixed(1);
    const actualL = (Number(answers.waterGlasses)*0.25).toFixed(1);
    if(Number(actualL) < Number(recommendedL)){
      f.push(`Your ideal water intake is ~${recommendedL}L/day, but you're currently at ~${actualL}L/day. This gap affects baseline skin hydration.`);
    }
  }
  if(answers.sleep==='< 5 hrs'){
    f.push('Limited sleep affects skin repair and inflammation regulation.');
  }
  if(answers.worsened==='Yes' && answers.worsenedWhen){
    f.push(`You noted your skin worsened around: "${answers.worsenedWhen}" — monitor changes from that specific period.`);
  }
  if(f.length===0) f.push("No single dominant lifestyle trigger stood out from your questionnaire responses.");
  return f;
}

function buildHygieneTips(report, answers){
  const tips = [
    "Avoid touching your face during the day — hands transfer oil and bacteria.",
    "Change your pillowcase every 2–3 days.",
    "Wash your face twice a day with a gentle cleanser.",
    "Never pop or pick at spots — it increases inflammation and scarring risk.",
    "Apply broad-spectrum SPF 30+ every morning."
  ];
  if(report.sebum>60) tips.push("Use blotting paper instead of over-washing if oil builds up midday.");
  if(report.hydration<45) tips.push("Layer a fragrance-free moisturizer even if skin feels oily — hydration repairs the barrier.");
  return tips;
}

function recommendProducts(report, answers){
  const recs = [];
  recs.push({
    cat:'Face Wash', ing: report.sebum>=55 ? 'Salicylic Acid 2% Gel Cleanser' : report.hydration<45 ? 'Ceramide Cream Cleanser' : 'Gentle pH-Balanced Foaming Cleanser',
    why: report.sebum>=55 ? 'Helps clear excess sebum and keep pores from clogging.' : 'Cleans without stripping your delicate skin barrier.'
  });
  recs.push({
    cat:'Serum', ing: report.acneCount>6 || (answers.worsened==='Yes' && report.acneCount==='N/A') ? 'Niacinamide 10% + Zinc Serum' : report.pigmentation>=55 ? 'Vitamin C / Alpha Arbutin Serum' : 'Hyaluronic Acid Hydrating Serum',
    why: report.acneCount>6 || (answers.worsened==='Yes' && report.acneCount==='N/A') ? 'Reduces inflammation and regulates oil production.' : report.pigmentation>=55 ? 'Targets pigmentation and fades dark spots.' : 'Boosts deep hydration to support barrier repair.'
  });
  recs.push({
    cat:'Moisturizer', ing: report.sebum>=60 ? 'Oil-Free Water Gel Moisturizer' : 'Ceramide-Rich Barrier Cream',
    why: report.sebum>=60 ? 'Hydrates without adding excess surface oil.' : 'Repairs and strengthens a compromised moisture barrier.'
  });
  recs.push({
    cat:'Sunscreen', ing:'Broad-Spectrum SPF 50 (Non-Comedogenic)',
    why:'Crucial for preventing further pigmentation and protecting healing skin.'
  });
  
  const severe = report.healthScore < 45;
  const supplement = severe ? {
    cat:'Internal Support (Consult Doctor)',
    ing:'Zinc / Vitamin D3 / Omega-3',
    why:'Your profile indicates internal inflammation where holistic support may be recommended.',
    warning:true
  } : null;
  return { recs, supplement, severe };
}

function renderAuthForm(){
  const holder = document.getElementById('authFormWrap');
  const isLogin = state.authMode === 'login';
  
  holder.innerHTML = `
    ${!isLogin ? `<div class="field"><label>Full Name</label><input type="text" id="authName" placeholder="Jane Doe"/></div>` : ''}

  `;
  
  holder.querySelector('#authSubmit').addEventListener('click', async ()=>{
    const email = holder.querySelector('#authEmail').value.trim();
    const pass = holder.querySelector('#authPass').value;
    const name = !isLogin ? holder.querySelector('#authName').value.trim() : '';
    const statEl = holder.querySelector('#authStatus');
    
    statEl.style.display = 'block';
    statEl.className = 'status-text error';
    
    if(!email.includes('@') || pass.length < 6 || (!isLogin && name.length < 2)){
      statEl.textContent = 'Please fill out all fields correctly (pass > 5 chars).';
      return;
    }
    
    let users = await loadUsers();
    
    if (isLogin) {
      const u = users.find(x => x.email === email && x.pass === pass);
      if (u) {
        state.isGuest = false;
        state.user = { name: u.name, email: u.email };
        state.justLoggedIn = true;
        await saveSession();
        state.history = await loadHistory();
        state.screen = 'home';
        render();
      } else {
        statEl.textContent = 'User not registered or incorrect password. Kindly sign up.';
      }
    } else {
      if (users.find(x => x.email === email)) {
        statEl.textContent = 'Email already registered. Please log in.';
        return;
      }
      users.push({ name, email, pass });
      await saveUsers(users);
      
      statEl.className = 'status-text success';
      statEl.textContent = 'Successfully Registered! Please log in.';
      
      setTimeout(() => {
        state.authMode = 'login';
        render();
      }, 1500);
    }
  });
}

function scoreRingSvg(score,size){
  const r = size/2 - 10, c = size/2, circ = 2*Math.PI*r;
  const offset = circ * (1 - score/100);
  const color = score>=70?'var(--good)':score>=40?'var(--warn)':'var(--bad)';
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
    <circle cx="${c}" cy="${c}" r="${r}" stroke="var(--surface-alt)" stroke-width="10" fill="none"/>
    <circle cx="${c}" cy="${c}" r="${r}" stroke="${color}" stroke-width="10" fill="none"
      stroke-dasharray="${circ}" stroke-dashoffset="${offset}" stroke-linecap="round" transform="rotate(-90 ${c} ${c})"/>
    <text x="${c}" y="${c-2}" text-anchor="middle" font-family="IBM Plex Mono" font-weight="800" font-size="${size*0.25}" fill="var(--ink)">${score}</text>
    <text x="${c}" y="${c+22}" text-anchor="middle" font-family="Inter" font-weight="700" font-size="10.5" letter-spacing="0.5" fill="var(--ink-faint)">SKIN SCORE</text>
  </svg>`;
}

function emptyRingSvg(size){
  const r=size/2-10,c=size/2;
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
    <circle cx="${c}" cy="${c}" r="${r}" stroke="var(--border-strong)" stroke-width="8" fill="none" stroke-dasharray="6 8"/>
    <text x="${c}" y="${c+5}" text-anchor="middle" font-family="Inter" font-weight="600" font-size="13" fill="var(--ink-soft)">Scan to begin</text>
  </svg>`;
}

let mediaStream = null;
function renderCapture(){
  const steps = ['front','left','right'];
  const idx = steps.indexOf(state.captureStep);
  const labels = {front:'Face the camera straight on',left:'Turn slightly to show your left cheek',right:'Turn slightly to show your right cheek'};
  const current = state.capture[state.captureStep];
  
  const wrap = el(`<div class="screen container stack" style="padding-top:24px;">
    <div class="row" style="justify-content:space-between;">
      <div class="iconbtn" id="backBtn">${iconSvg('x')}</div>

      <div style="width:38px;"></div>
    </div>
    
    <div class="stepper">${steps.map((st,i)=>`<div class="stepdot ${i<idx?'done':i===idx?'active':''}"></div>`).join('')}</div>
    <p class="muted" style="text-align:center; margin-top: -4px;">${labels[state.captureStep]}</p>
    
    <div class="capture-frame" id="captureFrame">
      ${current ? `<img src="${current}"/>` : `<div class="capture-placeholder">${iconSvg('camera')}<span>No photo captured yet</span></div><div class="capture-oval"></div>`}
    </div>
    
    <div class="capture-actions">
      <button class="btn btn-ghost" id="cameraBtn" style="flex:1;">${iconSvg('camera')} Live Cam</button>
      <button class="btn btn-ghost" id="uploadBtn" style="flex:1;">${iconSvg('upload')} Upload</button>
    </div>
    <input type="file" id="fileInput" accept="image/*" style="display:none;"/>
    
    <div class="card stack" style="padding: 16px;">
      <div class="tip-item">${iconSvg('check')}<span>Good, even lighting — face a window if possible.</span></div>
      <div class="tip-item">${iconSvg('check')}<span>Remove makeup and glasses for the most accurate scan.</span></div>
    </div>
    
    <button class="btn btn-primary" id="nextBtn" ${current?'':'disabled style="opacity:.5;"'}>
      ${idx<2 ? 'Next Angle' : 'Analyze My Skin'}
    </button>
    
    ${idx===0 ? `<div class="skip-link"><button class="btn-text" id="skipScanBtn" style="color:var(--ink-soft); font-size:13px; font-weight:500;">Skip scan — answer questions instead</button></div>` : ''}
  </div>`);
  mount(wrap);

  wrap.querySelector('#backBtn').addEventListener('click', ()=>{ stopCamera(); state.screen='home'; render(); });
  
  if(idx===0){
    wrap.querySelector('#skipScanBtn').addEventListener('click', ()=>{
      stopCamera();
      state.skippedScan = true;
      state.report = null;
      state.qStep = 0;
      state.screen = 'questionnaire';
      render();
    });
  }
  
  wrap.querySelector('#uploadBtn').addEventListener('click', ()=> wrap.querySelector('#fileInput').click());
  wrap.querySelector('#fileInput').addEventListener('change', (e)=>{
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = ()=>{ state.capture[state.captureStep] = reader.result; stopCamera(); render(); };
    reader.readAsDataURL(file);
  });
  
  wrap.querySelector('#cameraBtn').addEventListener('click', async ()=>{
    const frame = wrap.querySelector('#captureFrame');
    try{
      mediaStream = await navigator.mediaDevices.getUserMedia({ video:{ facingMode:'user' }, audio:false });
      frame.innerHTML = `<video autoplay playsinline></video><div class="capture-oval"></div>`;
      const video = frame.querySelector('video');
      video.srcObject = mediaStream;
      const shootBtn = document.createElement('button');
      shootBtn.className='btn btn-primary';
      shootBtn.style.position='absolute'; shootBtn.style.bottom='20px'; shootBtn.style.left='50%'; shootBtn.style.transform='translateX(-50%)'; shootBtn.style.width='auto'; shootBtn.style.padding='12px 24px';
      shootBtn.innerHTML=`${iconSvg('camera')} Capture`;
      frame.appendChild(shootBtn);
      shootBtn.addEventListener('click', ()=>{
        const canvas = document.createElement('canvas');
        canvas.width = video.videoWidth || 480; canvas.height = video.videoHeight || 640;
        canvas.getContext('2d').drawImage(video,0,0,canvas.width,canvas.height);
        state.capture[state.captureStep] = canvas.toDataURL('image/jpeg',0.85);
        stopCamera();
        render();
      });
    }catch(err){
      alert("Live camera isn't available in this preview environment. Please use Upload instead.");
    }
  });
  
  wrap.querySelector('#nextBtn').addEventListener('click', ()=>{
    if(!state.capture[state.captureStep]) return;
    if(idx<2){ state.captureStep = steps[idx+1]; render(); }
    else { runAnalysis(); }
  });
}

    if(state.skippedScan){
      state.report = estimateSkinFromAnswers(state.answers);
      state.activeAngleTab = 'overall';
      state.screen = 'scorePopup';
    } else {
      const f = analyzeSkin('front', state.answers), l = analyzeSkin('left', state.answers), r = analyzeSkin('right', state.answers);
      state.report = combineReports(f,l,r);
      state.screen = 'scorePopup'; 
    }
    render(); return;
  }
  
  const q = qs[state.qStep];
  const pct = Math.round(((state.qStep)/qs.length)*100);
  
  const wrap = el(`<div class="screen container stack" style="padding-top:24px;">
    <div class="progress-track"><div class="progress-fill" style="width:${pct}%;"></div></div>
    <p class="muted" style="margin:0; font-size:12px; font-weight:600; text-transform:uppercase; letter-spacing:1px;">Question ${state.qStep+1} / ${qs.length}</p>
    
    <h2 style="font-size:22px; line-height:1.35; margin-top:8px;">${q.title}</h2>
    
    <div id="qBody" style="margin-top: 16px;"></div>
    
    <div class="row" style="margin-top:24px;">
      ${state.qStep>0 ? `<button class="btn btn-ghost" id="backQBtn" style="flex:0.5;">Back</button>` : `<div style="flex:0.5;"></div>`}
      <button class="btn btn-primary" id="nextQBtn" style="flex:1;">${state.qStep===qs.length-1?'Analyze Answers':'Next'}</button>
    </div>
    
    ${q.key==='health' ? '<p class="muted" style="font-size:12px; text-align:center;">This is optional and kept private — used only to tailor advice.</p>' : ''}
  </div>`);
  mount(wrap);
  
  const body = wrap.querySelector('#qBody');
  if(q.type==='pills'){
    body.innerHTML = `<div class="pillrow">${q.options.map(o=>`<div class="pill ${state.answers[q.key]===o?'selected':''}" data-val="${o}">${o}</div>`).join('')}</div>`;
    body.querySelectorAll('.pill').forEach(p=>p.addEventListener('click', ()=>{
      state.answers[q.key]=p.dataset.val; render();
    }));
  } else if(q.type==='text'){
    body.innerHTML = `<div class="field"><textarea rows="4" placeholder="${q.placeholder||''}">${state.answers[q.key]||''}</textarea></div>`;
    body.querySelector('textarea').addEventListener('input', (e)=>{ state.answers[q.key]=e.target.value; });
  } else if(q.type==='number'){
    body.innerHTML = `<div class="field"><input type="number" placeholder="${q.placeholder||''}" value="${state.answers[q.key]||''}"/></div>`;
    body.querySelector('input').addEventListener('input', (e)=>{ state.answers[q.key]=e.target.value; });
  }
  
  wrap.querySelector('#nextQBtn').addEventListener('click', ()=>{ state.qStep++; render(); });
  if(state.qStep>0) wrap.querySelector('#backQBtn').addEventListener('click', ()=>{ state.qStep--; render(); });
}

/* ---- Score Popup (Pre-Result) ---- */
function renderScorePopup() {
  const rpt = state.report;
  let baseAge = state.answers.age ? parseInt(state.answers.age) : 25;
  let skinAge = baseAge + Math.round((rpt.damage - 40) / 8);
  if (skinAge < 16) skinAge = 16;
  
  const wrap = el(`<div class="screen container" style="height:100vh; display:flex; align-items:center; justify-content:center; flex-direction:column;">
    <div class="popup-card stack">
      <div class="brand-mark" style="margin: 0 auto 10px; width:48px; height:48px; border-radius:12px;">${iconSvg('check')}</div>
      <h2 style="font-size: 22px;">Analysis Complete</h2>
      
      <div class="divider"></div>
      
      <p class="muted" style="margin:0;">Overall Skin Score</p>
      <div class="popup-number">${rpt.healthScore}<span style="font-size:20px; color:var(--ink-soft);">/100</span></div>
      
      ${state.skippedScan ? 
        `<p class="muted" style="font-size:12px; margin-top:10px;">(Estimated from questionnaire)</p>` : 
        `<div style="background:var(--surface-alt); border-radius:8px; padding:12px; margin-top:8px;">
           <p class="muted" style="margin:0; font-size:12px;">Estimated Skin Age</p>
           <div style="font-size:24px; font-weight:800; font-family:'IBM Plex Mono'; color:var(--ink);">${skinAge} yrs</div>
         </div>`
      }
      
      <button class="btn btn-primary" id="viewReportBtn" style="margin-top:20px;">View Detailed Report</button>
    </div>
  </div>`);
  mount(wrap);
  
  wrap.querySelector('#viewReportBtn').addEventListener('click', ()=>{
    state.screen = 'report'; render();
  });
}

/* ---- Report ---- */
function metricBar(label, value, invert){
  if(value === 'N/A') {
    return `<div class="metric-row">
      <div class="metric-head"><span>${label}</span><b style="color:var(--ink-faint);">N/A</b></div>
      <div class="metric-track"><div class="metric-fill" style="width:0%;"></div></div>
    </div>`;
  }
  const sev = severity(value, invert);
  return `<div class="metric-row">
    <div class="metric-head"><span>${label}</span><b>${value}/100</b></div>
    <div class="metric-track"><div class="metric-fill" style="width:${value}%;background:${sevColor(sev)};"></div></div>
  </div>`;
}

function renderReport(){
  const rpt = state.report;
  const wrap = el(`<div class="screen container stack" style="padding-top:24px; padding-bottom: 30px;">
    <h2>Your Skin Report</h2>
    ${state.skippedScan ? `<div class="warning-box" style="background:var(--warn-tint); border-color:rgba(217,119,6,0.3); color:var(--warn);"><span style="font-size:18px;">ℹ️</span><span>Metrics are estimated strictly from your answers. Run a photo scan for precise visual data.</span></div>` : ''}
    
    <div class="card" style="text-align:center;">
      <div id="reportRing"></div>
      <span class="badge badge-${severity(rpt.healthScore,false)==='good'?'good':severity(rpt.healthScore,false)==='mid'?'mid':'bad'}" style="margin-top:16px; font-size: 12px; padding: 6px 14px;">${sevLabel(severity(rpt.healthScore,false))}</span>
    </div>

    ${state.skippedScan ? '' : `<div class="angle-tabs">
      <div class="angle-tab ${state.activeAngleTab==='overall'?'active':''}" data-a="overall">Overall</div>
      <div class="angle-tab ${state.activeAngleTab==='front'?'active':''}" data-a="front">Front</div>
      <div class="angle-tab ${state.activeAngleTab==='left'?'active':''}" data-a="left">Left</div>
      <div class="angle-tab ${state.activeAngleTab==='right'?'active':''}" data-a="right">Right</div>
    </div>`}
    
    <div class="card stack" id="metricsHolder"></div>

    <div class="section-head"><span class="section-eyebrow">01 — Analysis</span><h3>Skin Condition Summary</h3></div>
    <div class="card stack">${buildSummary(rpt, state.answers).map(l=>`<p style="font-size:14px;line-height:1.6;margin:0;">• ${l}</p>`).join('')}</div>

    <div class="section-head"><span class="section-eyebrow">02 — Root Causes</span><h3>Likely Contributing Factors</h3></div>
    <div class="card stack">${buildFactors(rpt, state.answers).map(l=>`<p style="font-size:14px;line-height:1.6;margin:0;">• ${l}</p>`).join('')}</div>

    <div class="section-head"><span class="section-eyebrow">03 — Daily Routine</span><h3>Hygiene & Lifestyle Recommendations</h3></div>
    <div class="card stack">${buildHygieneTips(rpt, state.answers).map(l=>`<div class="tip-item">${iconSvg('check')}<span>${l}</span></div>`).join('')}</div>

    <p class="disclaimer" style="margin-top: 10px;">This analysis is for informational/cosmetic guidance only and is not a medical diagnosis.</p>

    <button class="btn btn-primary" id="seeProductsBtn" style="padding: 16px;">Build My Routine</button>
  </div>`);
  mount(wrap);
  
  wrap.querySelector('#reportRing').innerHTML = scoreRingSvg(rpt.healthScore, 160);
  renderMetrics(wrap);
  
  if(!state.skippedScan){
    wrap.querySelectorAll('.angle-tab').forEach(t=>t.addEventListener('click', ()=>{ state.activeAngleTab=t.dataset.a; render(); }));
  }
  
  wrap.querySelector('#seeProductsBtn').addEventListener('click', async ()=>{
    if(!state.isGuest){
      const thumb = state.capture.front;
      const entry = { id: Date.now(), date: new Date().toISOString(), report: rpt, answers: {...state.answers}, skipped: state.skippedScan, thumb };
      state.history.unshift(entry);
      await saveHistory();
    }
    state.screen='recommendations'; render();
  });
}

function renderMetrics(wrap){
  const holder = wrap.querySelector('#metricsHolder');
  const rpt = state.report;
  const src = state.activeAngleTab==='overall' ? rpt : rpt.byAngle[state.activeAngleTab];
  
  holder.innerHTML = `
    ${metricBar('Sebum / Oil level', src.sebum, true)}
    ${metricBar('Hydration', src.hydration, false)}
    ${metricBar('Pigmentation / Marks', src.pigmentation, true)}
    ${metricBar('Texture / Smoothness', src.texture, false)}
    
    ${!state.skippedScan ? `
    <div class="divider"></div>
    <div class="row" style="justify-content:space-between;flex-wrap:wrap;gap:8px;background:var(--surface-alt);padding:12px;border-radius:8px;">
      <span class="mono muted" style="font-size:12px;">Spots: <b style="color:var(--ink)">${src.acneCount}</b></span>
      <span class="mono muted" style="font-size:12px;">Inflamed: <b style="color:var(--ink)">${src.inflammatoryAcne}</b></span>
      <span class="mono muted" style="font-size:12px;">Comedones: <b style="color:var(--ink)">${src.comedones}</b></span>
    </div>
    ` : ''}
  `;
}

/* ---- Recommendations ---- */
function renderRecommendations(){
  const { recs, supplement } = recommendProducts(state.report, state.answers);
  const wrap = el(`<div class="screen container stack" style="padding-top:24px; padding-bottom:30px;">
    <h2>Recommended For You</h2>
    <p class="muted">Matched specifically to your skin barrier needs based on your analysis.</p>
    <div class="stack" id="recList" style="margin-top:10px;"></div>
    
    ${supplement ? `<div class="rec-card stack" style="border-left-color:var(--warn);">
      <span class="rec-cat" style="color:var(--warn);">${supplement.cat}</span>
      <div class="rec-ing">${supplement.ing}</div>
      <p class="muted">${supplement.why}</p>
      <div class="warning-box">${iconSvg('x')}<span style="color:inherit">Oral supplements should only be taken after consulting a doctor, especially if you have existing health conditions.</span></div>
    </div>` : ''}
    
    <button class="btn btn-primary" id="doneBtn" style="margin-top: 16px;">Finish & Save</button>
  </div>`);
  mount(wrap);
  
  const list = wrap.querySelector('#recList');
  recs.forEach(r=>{
    const card = el(`<div class="rec-card stack">
      <span class="rec-cat">${r.cat}</span>
      <div class="rec-ing">${r.ing}</div>
      <p class="muted" style="margin:0;">${r.why}</p>
    </div>`);
    list.appendChild(card);
  });
  wrap.querySelector('#doneBtn').addEventListener('click', ()=>{ state.screen='home'; render(); });
}

/* ---- History ---- */
function renderHistory(){
  const wrap = el(`<div class="screen container stack" style="padding-top:24px;">
    <div class="row" style="justify-content:space-between;">
      <h2>History</h2>
      <div class="iconbtn" id="closeHistBtn">${iconSvg('x')}</div>
    </div>
    
    ${state.isGuest ? `<div class="fade-banner"><span>Sign up to track your skin progress over time.</span></div>` : ''}
    
    <div class="stack" id="histList" style="margin-top: 10px;"></div>
    
    ${state.history.length===0 && !state.isGuest ? `<div class="empty-state"><div style="color:var(--primary);margin-bottom:12px;">${iconSvg('history')}</div><p>No scans recorded yet.</p><p class="muted">Run your first scan to start tracking progress.</p></div>` : ''}
    
    ${bottomNavHtml('history')}
  </div>`);
  mount(wrap);
  
  const list = wrap.querySelector('#histList');
  state.history.forEach((h, index)=>{
    const d = new Date(h.date);
    const item = el(`<div class="history-item" data-id="${h.id}">
      ${h.thumb ? `<img class="history-thumb" src="${h.thumb}"/>` : `<div class="history-thumb placeholder">${iconSvg('camera')}</div>`}
      <div style="flex:1;" class="hist-text-wrap">
        <b>${d.toLocaleDateString(undefined,{month:'short',day:'numeric',year:'numeric'})}</b>
        <p class="muted" style="margin:4px 0 0; font-size:12px;">Score: <b style="color:var(--primary); font-family:'IBM Plex Mono';">${h.report.healthScore}</b>/100${h.skipped ? ' · <i>Est</i>' : ''}</p>
      </div>
      <button class="delete-hist-btn" title="Delete record">${iconSvg('trash')}</button>
    </div>`);
    
    // View detail
    item.querySelector('.hist-text-wrap').parentElement.addEventListener('click', (e)=>{ 
      if(e.target.closest('.delete-hist-btn')) return;
      state.viewingHistoryId = h.id; state.screen='historyDetail'; render(); 
    });
    
    // Delete action
    item.querySelector('.delete-hist-btn').addEventListener('click', async (e)=>{
      e.stopPropagation();
      if(confirm('Delete this scan record?')) {
        state.history.splice(index, 1);
        await saveHistory();
        render();
      }
    });
    
    list.appendChild(item);
  });
  
  wrap.querySelector('#closeHistBtn').addEventListener('click', ()=>{ state.screen='home'; render(); });
  attachBottomNav(wrap);
}

function renderHistoryDetail(){
  const h = state.history.find(x=>x.id===state.viewingHistoryId);
  if(!h){ state.screen='history'; render(); return; }
  
  const wrap = el(`<div class="screen container stack" style="padding-top:24px; padding-bottom:30px;">
    <div class="row" style="justify-content:space-between;">
      <div class="iconbtn" id="backHistBtn">${iconSvg('x')}</div>
      <b style="font-size:16px;">${new Date(h.date).toLocaleDateString()}</b>
      <div style="width:38px;"></div>
    </div>
    
    ${h.skipped ? `<div class="warning-box" style="background:var(--warn-tint); border-color:rgba(217,119,6,0.3); color:var(--warn); padding:10px;"><span style="font-size:13px;">Metrics estimated from questionnaire (No scan image).</span></div>` : ''}
    
    <div class="card" style="text-align:center; padding: 30px 20px;"><div id="histRing"></div></div>
    
    <div class="card stack">
      ${metricBar('Sebum / Oil level', h.report.sebum, true)}
      ${metricBar('Hydration', h.report.hydration, false)}
      ${metricBar('Pigmentation / Marks', h.report.pigmentation, true)}
      ${metricBar('Texture Smoothness', h.report.texture, false)}
    </div>
    
    <div class="section-head"><h3>Skin Condition Summary</h3></div>
    <div class="card stack">${buildSummary(h.report, h.answers).map(l=>`<p style="font-size:14px;line-height:1.6;margin:0;">• ${l}</p>`).join('')}</div>
  </div>`);
  mount(wrap);
  
  wrap.querySelector('#histRing').innerHTML = scoreRingSvg(h.report.healthScore, 140);
  wrap.querySelector('#backHistBtn').addEventListener('click', ()=>{ state.screen='history'; render(); });
}

/* ---------------- boot ---------------- */
(async function boot(){
  const theme = safeGet('theme');
  if(theme === 'dark') {
    state.darkMode = true;
    document.body.classList.add('dark-mode');
  }

  const sessionUser = await loadSession();
  if(sessionUser) {
    state.user = sessionUser; 
    state.isGuest = false;
    state.history = await loadHistory();
    state.screen = 'home';
  }
  
  render();
})();
</script>
</body>
</html>
